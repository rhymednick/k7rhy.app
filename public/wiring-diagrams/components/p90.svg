<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 85">
  <rect width="150" height="85" fill="white"/>
  <text x="57" y="10" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#222">P90</text>
  <!-- Pickup body (wider/shallower than single-coil) -->
  <rect x="2" y="13" width="110" height="60" rx="3" fill="#efefef" stroke="#333" stroke-width="2"/>
  <!-- Inner outline -->
  <rect x="7" y="18" width="100" height="50" rx="2" fill="none" stroke="#aaa" stroke-width="0.75" stroke-dasharray="3,2"/>
  <!-- 6 larger adjustable pole screws -->
  <circle cx="13" cy="43" r="5.5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <circle cx="31" cy="43" r="5.5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <circle cx="49" cy="43" r="5.5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <circle cx="67" cy="43" r="5.5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <circle cx="85" cy="43" r="5.5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <circle cx="103" cy="43" r="5.5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <!-- Slot in each screw -->
  <line x1="13" y1="40" x2="13" y2="46" stroke="#555" stroke-width="1"/>
  <line x1="31" y1="40" x2="31" y2="46" stroke="#555" stroke-width="1"/>
  <line x1="49" y1="40" x2="49" y2="46" stroke="#555" stroke-width="1"/>
  <line x1="67" y1="40" x2="67" y2="46" stroke="#555" stroke-width="1"/>
  <line x1="85" y1="40" x2="85" y2="46" stroke="#555" stroke-width="1"/>
  <line x1="103" y1="40" x2="103" y2="46" stroke="#555" stroke-width="1"/>
  <!-- White wire (hot) -->
  <line x1="112" y1="31" x2="150" y2="31" stroke="#888" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="112" y1="31" x2="150" y2="31" stroke="#e8e8e8" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="150" cy="31" r="4" fill="#e0e0e0" stroke="#888" stroke-width="1"/>
  <!-- Black wire (ground) -->
  <line x1="112" y1="56" x2="150" y2="56" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="150" cy="56" r="4" fill="#1a1a1a"/>
</svg>
