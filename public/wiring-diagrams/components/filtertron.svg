<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 100">
  <defs>
    <linearGradient id="ch2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="50%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#d5d5d5"/>
    </linearGradient>
  </defs>
  <rect width="180" height="100" fill="white"/>
  <text x="74" y="11" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#222">FILTER'TRON</text>
  <!-- Outer mounting frame/ring -->
  <rect x="2" y="14" width="158" height="72" rx="3" fill="url(#ch2)" stroke="#555" stroke-width="2"/>
  <!-- Inner pickup recess -->
  <rect x="8" y="20" width="146" height="60" rx="2" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <!-- Left coil cover (square) -->
  <rect x="11" y="23" width="62" height="54" rx="2" fill="#ddd" stroke="#888" stroke-width="1"/>
  <!-- Right coil cover (square) -->
  <rect x="87" y="23" width="62" height="54" rx="2" fill="#ddd" stroke="#888" stroke-width="1"/>
  <!-- Center gap/spacer -->
  <rect x="73" y="23" width="14" height="54" fill="#c8c8c8" stroke="#999" stroke-width="0.5"/>
  <!-- Left coil pole screws (3) -->
  <circle cx="24" cy="50" r="5.5" fill="#bbb" stroke="#666" stroke-width="1.5"/>
  <circle cx="42" cy="50" r="5.5" fill="#bbb" stroke="#666" stroke-width="1.5"/>
  <circle cx="60" cy="50" r="5.5" fill="#bbb" stroke="#666" stroke-width="1.5"/>
  <!-- Screw slots -->
  <line x1="24" y1="46" x2="24" y2="54" stroke="#555" stroke-width="1.5"/>
  <line x1="42" y1="46" x2="42" y2="54" stroke="#555" stroke-width="1.5"/>
  <line x1="60" y1="46" x2="60" y2="54" stroke="#555" stroke-width="1.5"/>
  <!-- Right coil pole screws (3) -->
  <circle cx="100" cy="50" r="5.5" fill="#bbb" stroke="#666" stroke-width="1.5"/>
  <circle cx="118" cy="50" r="5.5" fill="#bbb" stroke="#666" stroke-width="1.5"/>
  <circle cx="136" cy="50" r="5.5" fill="#bbb" stroke="#666" stroke-width="1.5"/>
  <line x1="100" y1="46" x2="100" y2="54" stroke="#555" stroke-width="1.5"/>
  <line x1="118" y1="46" x2="118" y2="54" stroke="#555" stroke-width="1.5"/>
  <line x1="136" y1="46" x2="136" y2="54" stroke="#555" stroke-width="1.5"/>
  <!-- Black wire (hot) -->
  <line x1="160" y1="38" x2="180" y2="38" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="180" cy="38" r="4" fill="#1a1a1a"/>
  <!-- Green wire (ground/shield) -->
  <line x1="160" y1="68" x2="180" y2="68" stroke="#2a7a38" stroke-width="3" stroke-linecap="round"/>
  <circle cx="180" cy="68" r="4" fill="#2a7a38"/>
</svg>
