<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 90">
  <defs>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f2f2f2"/>
      <stop offset="25%"  stop-color="#d8d8d8"/>
      <stop offset="55%"  stop-color="#b0b0b0"/>
      <stop offset="80%"  stop-color="#c8c8c8"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
  </defs>
  <rect width="200" height="90" fill="white"/>

  <!-- Outer mounting ring (slightly wider, black border) -->
  <rect x="2" y="12" width="156" height="66" rx="5" fill="#c0c0c0" stroke="#444" stroke-width="2"/>
  <!-- Chrome cover (unified — no visible coil split) -->
  <rect x="6" y="15" width="148" height="60" rx="4" fill="url(#chrome)" stroke="#888" stroke-width="1"/>

  <!-- Highlight stripe (chrome sheen) -->
  <rect x="8" y="17" width="144" height="10" rx="2" fill="white" opacity="0.35"/>

  <!-- 6 pole screws — single row, centered, widely spaced (Filtertron style) -->
  <circle cx="26"  cy="45" r="6.5" fill="#aaa" stroke="#666" stroke-width="1.5"/>
  <line x1="26"  y1="39" x2="26"  y2="51" stroke="#555" stroke-width="1.5"/>
  <circle cx="50"  cy="45" r="6.5" fill="#aaa" stroke="#666" stroke-width="1.5"/>
  <line x1="50"  y1="39" x2="50"  y2="51" stroke="#555" stroke-width="1.5"/>
  <circle cx="74"  cy="45" r="6.5" fill="#aaa" stroke="#666" stroke-width="1.5"/>
  <line x1="74"  y1="39" x2="74"  y2="51" stroke="#555" stroke-width="1.5"/>
  <circle cx="98"  cy="45" r="6.5" fill="#aaa" stroke="#666" stroke-width="1.5"/>
  <line x1="98"  y1="39" x2="98"  y2="51" stroke="#555" stroke-width="1.5"/>
  <circle cx="122" cy="45" r="6.5" fill="#aaa" stroke="#666" stroke-width="1.5"/>
  <line x1="122" y1="39" x2="122" y2="51" stroke="#555" stroke-width="1.5"/>
  <circle cx="146" cy="45" r="6.5" fill="#aaa" stroke="#666" stroke-width="1.5"/>
  <line x1="146" y1="39" x2="146" y2="51" stroke="#555" stroke-width="1.5"/>

  <!-- Label -->
  <text x="79" y="67" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" text-anchor="middle" fill="#555">FILTER'TRON</text>
  <text x="79" y="76" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#888">chrome cover · humbucking</text>

  <!-- Hot wire (black) -->
  <line x1="158" y1="30" x2="198" y2="30" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="198" cy="30" r="4" fill="#1a1a1a"/>
  <!-- Ground wire (green) -->
  <line x1="158" y1="60" x2="198" y2="60" stroke="#2a7a38" stroke-width="3" stroke-linecap="round"/>
  <circle cx="198" cy="60" r="4" fill="#2a7a38"/>
</svg>
