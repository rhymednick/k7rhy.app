<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 45">
  <rect width="80" height="45" fill="white"/>
  <!-- Left lead wire -->
  <line x1="0" y1="22" x2="28" y2="22" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Left plate -->
  <line x1="28" y1="4" x2="28" y2="40" stroke="#333" stroke-width="4.5" stroke-linecap="square"/>
  <!-- Right plate -->
  <line x1="42" y1="4" x2="42" y2="40" stroke="#333" stroke-width="4.5" stroke-linecap="square"/>
  <!-- Right lead wire -->
  <line x1="42" y1="22" x2="80" y2="22" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Connection dots at wire ends -->
  <circle cx="0" cy="22" r="4" fill="#333"/>
  <circle cx="80" cy="22" r="4" fill="#333"/>
  <!-- Label -->
  <text x="35" y="45" font-family="Arial,sans-serif" font-size="8" text-anchor="middle" fill="#555">CAP</text>
</svg>
