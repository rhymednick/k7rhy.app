<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 190">
  <rect width="130" height="190" fill="white"/>
  <text x="65" y="10" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#222">PUSH-PULL POT</text>
  <!-- Shaft (top) with PP indicator -->
  <rect x="55" y="12" width="20" height="8" rx="2" fill="#888" stroke="#555" stroke-width="1"/>
  <text x="65" y="19" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="white" font-weight="bold">PP</text>
  <!-- Pot body -->
  <circle cx="65" cy="63" r="50" fill="#efefef" stroke="#333" stroke-width="2"/>
  <!-- Resistive element arc -->
  <path d="M 24 90 A 44 44 0 1 1 106 90" fill="none" stroke="#bbb" stroke-width="3" stroke-linecap="round"/>
  <!-- Wiper indicator -->
  <line x1="65" y1="63" x2="65" y2="22" stroke="#888" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="65" cy="22" r="3" fill="#888"/>
  <!-- Center hub -->
  <circle cx="65" cy="63" r="8" fill="#ccc" stroke="#888" stroke-width="1.5"/>
  <text x="65" y="60" font-family="Arial,sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">VOL</text>
  <text x="65" y="74" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="#666">500K</text>
  <!-- Pot lug labels -->
  <text x="16" y="116" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#555">1</text>
  <text x="65" y="125" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#555">2</text>
  <text x="114" y="116" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#555">3</text>
  <!-- Pot lug stubs -->
  <line x1="27" y1="95" x2="27" y2="138" stroke="#555" stroke-width="1.5"/>
  <rect x="22" y="130" width="10" height="8" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <line x1="65" y1="113" x2="65" y2="138" stroke="#555" stroke-width="1.5"/>
  <rect x="60" y="130" width="10" height="8" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <line x1="103" y1="95" x2="103" y2="138" stroke="#555" stroke-width="1.5"/>
  <rect x="98" y="130" width="10" height="8" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="27" cy="138" r="4" fill="#555"/>
  <circle cx="65" cy="138" r="4" fill="#555"/>
  <circle cx="103" cy="138" r="4" fill="#555"/>
  <!-- DPDT switch section (below pot lugs) -->
  <text x="65" y="155" font-family="Arial,sans-serif" font-size="8" text-anchor="middle" fill="#555">— DPDT switch —</text>
  <!-- Switch contacts: 6 contacts in 2 rows of 3 -->
  <!-- Row 1 contacts (C, NC, NO for top pole) -->
  <line x1="20" y1="162" x2="20" y2="183" stroke="#555" stroke-width="1.5"/>
  <rect x="15" y="175" width="10" height="8" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="20" cy="183" r="4" fill="#555"/>
  <line x1="65" y1="162" x2="65" y2="183" stroke="#555" stroke-width="1.5"/>
  <rect x="60" y="175" width="10" height="8" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="65" cy="183" r="4" fill="#555"/>
  <line x1="110" y1="162" x2="110" y2="183" stroke="#555" stroke-width="1.5"/>
  <rect x="105" y="175" width="10" height="8" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="110" cy="183" r="4" fill="#555"/>
  <!-- Row labels -->
  <text x="20" y="160" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#555">C</text>
  <text x="65" y="160" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#555">NC</text>
  <text x="110" y="160" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#555">NO</text>
</svg>
