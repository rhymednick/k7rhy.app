<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 120">
  <rect width="260" height="120" fill="white"/>
  <text x="130" y="10" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#222">5-WAY BLADE SWITCH</text>
  <!-- Switch housing -->
  <rect x="10" y="18" width="240" height="42" rx="3" fill="#efefef" stroke="#333" stroke-width="2"/>
  <!-- Blade slot -->
  <rect x="20" y="24" width="220" height="8" rx="4" fill="#ddd" stroke="#888" stroke-width="1"/>
  <!-- 5 position markers -->
  <line x1="45" y1="24" x2="45" y2="32" stroke="#555" stroke-width="1.5"/>
  <line x1="90" y1="24" x2="90" y2="32" stroke="#555" stroke-width="1.5"/>
  <line x1="130" y1="24" x2="130" y2="32" stroke="#555" stroke-width="1.5"/>
  <line x1="170" y1="24" x2="170" y2="32" stroke="#555" stroke-width="1.5"/>
  <line x1="215" y1="24" x2="215" y2="32" stroke="#555" stroke-width="1.5"/>
  <text x="45" y="23" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#444">1</text>
  <text x="90" y="23" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#444">2</text>
  <text x="130" y="23" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#444">3</text>
  <text x="170" y="23" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#444">4</text>
  <text x="215" y="23" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#444">5</text>
  <!-- Blade lever -->
  <rect x="124" y="14" width="12" height="18" rx="3" fill="#aaa" stroke="#666" stroke-width="1.5"/>
  <!-- Contact labels inside housing -->
  <text x="38" y="46" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#555">BRDG</text>
  <text x="85" y="46" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#555">MID</text>
  <text x="130" y="46" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#555">COM</text>
  <text x="175" y="46" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#555">MID</text>
  <text x="222" y="46" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#555">NECK</text>
  <!-- 5 contact stubs -->
  <line x1="30" y1="60" x2="30" y2="110" stroke="#555" stroke-width="1.5"/>
  <rect x="25" y="100" width="10" height="10" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="30" cy="110" r="4" fill="#555"/>
  <line x1="75" y1="60" x2="75" y2="110" stroke="#555" stroke-width="1.5"/>
  <rect x="70" y="100" width="10" height="10" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="75" cy="110" r="4" fill="#555"/>
  <line x1="130" y1="60" x2="130" y2="110" stroke="#555" stroke-width="1.5"/>
  <rect x="125" y="100" width="10" height="10" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="130" cy="110" r="4" fill="#555"/>
  <line x1="185" y1="60" x2="185" y2="110" stroke="#555" stroke-width="1.5"/>
  <rect x="180" y="100" width="10" height="10" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="185" cy="110" r="4" fill="#555"/>
  <line x1="230" y1="60" x2="230" y2="110" stroke="#555" stroke-width="1.5"/>
  <rect x="225" y="100" width="10" height="10" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="230" cy="110" r="4" fill="#555"/>
  <!-- Contact labels -->
  <text x="30" y="74" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#666">A</text>
  <text x="75" y="74" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#666">B</text>
  <text x="130" y="74" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#666">C</text>
  <text x="185" y="74" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#666">D</text>
  <text x="230" y="74" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#666">E</text>
</svg>
