<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 200">
  <rect width="260" height="200" fill="white"/>

  <!-- POLE 1 — top (C, 1, 2, 3)  [5 positions via mechanical detent] -->
  <line x1="52"  y1="5" x2="52"  y2="70" stroke="#555" stroke-width="1.5"/>
  <line x1="104" y1="5" x2="104" y2="70" stroke="#555" stroke-width="1.5"/>
  <line x1="156" y1="5" x2="156" y2="70" stroke="#555" stroke-width="1.5"/>
  <line x1="208" y1="5" x2="208" y2="70" stroke="#555" stroke-width="1.5"/>
  <circle cx="52"  cy="5" r="4" fill="#555"/>
  <circle cx="104" cy="5" r="4" fill="#555"/>
  <circle cx="156" cy="5" r="4" fill="#555"/>
  <circle cx="208" cy="5" r="4" fill="#555"/>
  <text x="52"  y="19" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#555">C</text>
  <text x="104" y="19" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#555">1</text>
  <text x="156" y="19" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#555">2</text>
  <text x="208" y="19" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#555">3</text>
  <text x="14" y="68" font-family="Arial,sans-serif" font-size="6.5" fill="#888">P1↑</text>

  <!-- Switch housing -->
  <rect x="10" y="70" width="240" height="60" rx="3" fill="#efefef" stroke="#333" stroke-width="2"/>
  <!-- Blade slot -->
  <rect x="22" y="78" width="216" height="8" rx="4" fill="#ddd" stroke="#888" stroke-width="1"/>
  <!-- 5 position markers -->
  <line x1="45"  y1="78" x2="45"  y2="86" stroke="#555" stroke-width="1.5"/>
  <line x1="88"  y1="78" x2="88"  y2="86" stroke="#555" stroke-width="1.5"/>
  <line x1="130" y1="78" x2="130" y2="86" stroke="#555" stroke-width="1.5"/>
  <line x1="172" y1="78" x2="172" y2="86" stroke="#555" stroke-width="1.5"/>
  <line x1="215" y1="78" x2="215" y2="86" stroke="#555" stroke-width="1.5"/>
  <text x="45"  y="77" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#444">1</text>
  <text x="88"  y="77" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#444">2</text>
  <text x="130" y="77" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#444">3</text>
  <text x="172" y="77" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#444">4</text>
  <text x="215" y="77" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#444">5</text>
  <!-- Blade lever at pos 3 (center) -->
  <rect x="124" y="67" width="12" height="20" rx="3" fill="#aaa" stroke="#666" stroke-width="1.5"/>
  <!-- Title -->
  <text x="130" y="111" font-family="Arial,sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="#333">5-WAY BLADE  (2P5T)</text>
  <text x="14" y="128" font-family="Arial,sans-serif" font-size="6.5" fill="#888">P2↓</text>

  <!-- POLE 2 — bottom (C, 1, 2, 3) -->
  <line x1="52"  y1="130" x2="52"  y2="195" stroke="#555" stroke-width="1.5"/>
  <line x1="104" y1="130" x2="104" y2="195" stroke="#555" stroke-width="1.5"/>
  <line x1="156" y1="130" x2="156" y2="195" stroke="#555" stroke-width="1.5"/>
  <line x1="208" y1="130" x2="208" y2="195" stroke="#555" stroke-width="1.5"/>
  <text x="52"  y="182" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#555">C</text>
  <text x="104" y="182" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#555">1</text>
  <text x="156" y="182" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#555">2</text>
  <text x="208" y="182" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#555">3</text>
  <circle cx="52"  cy="195" r="4" fill="#555"/>
  <circle cx="104" cy="195" r="4" fill="#555"/>
  <circle cx="156" cy="195" r="4" fill="#555"/>
  <circle cx="208" cy="195" r="4" fill="#555"/>
</svg>
