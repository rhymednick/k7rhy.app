<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 155">
  <rect width="80" height="155" fill="white"/>
  <text x="40" y="10" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#222">MINI</text>
  <text x="40" y="22" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#222">TOGGLE</text>
  <!-- Toggle tip (ball) -->
  <circle cx="40" cy="34" r="7" fill="#ccc" stroke="#777" stroke-width="1.5"/>
  <!-- Lever shaft -->
  <rect x="37" y="40" width="6" height="18" fill="#bbb" stroke="#777" stroke-width="1"/>
  <!-- Mounting nut / bushing -->
  <rect x="28" y="56" width="24" height="12" rx="2" fill="#d8d8d8" stroke="#666" stroke-width="1.5"/>
  <line x1="28" y1="61" x2="52" y2="61" stroke="#bbb" stroke-width="0.75"/>
  <!-- Switch housing (smaller than 3-way toggle) -->
  <rect x="20" y="68" width="40" height="46" rx="4" fill="#efefef" stroke="#333" stroke-width="2"/>
  <!-- DPDT indicator (two circles) -->
  <circle cx="33" cy="84" r="4" fill="#ddd" stroke="#888" stroke-width="1"/>
  <circle cx="47" cy="84" r="4" fill="#ddd" stroke="#888" stroke-width="1"/>
  <text x="40" y="103" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#666">DPDT</text>
  <!-- 6 solder lugs (3 per pole, 2 rows) -->
  <!-- Left pole (lugs 1-3): C, NO, NC -->
  <line x1="27" y1="114" x2="27" y2="147" stroke="#555" stroke-width="1.5"/>
  <rect x="22" y="139" width="10" height="8" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="27" cy="147" r="4" fill="#555"/>
  <line x1="40" y1="114" x2="40" y2="147" stroke="#555" stroke-width="1.5"/>
  <rect x="35" y="139" width="10" height="8" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="40" cy="147" r="4" fill="#555"/>
  <line x1="53" y1="114" x2="53" y2="147" stroke="#555" stroke-width="1.5"/>
  <rect x="48" y="139" width="10" height="8" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="53" cy="147" r="4" fill="#555"/>
  <!-- Lug labels -->
  <text x="27" y="127" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#666">C</text>
  <text x="40" y="127" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#666">NO</text>
  <text x="53" y="127" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#666">NC</text>
</svg>
