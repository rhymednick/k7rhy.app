<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 40">
  <rect width="100" height="40" fill="white"/>
  <!-- Left lead -->
  <line x1="0" y1="20" x2="16" y2="20" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Zigzag body (North American resistor symbol) -->
  <polyline
    points="16,20 20,6 26,34 32,6 38,34 44,6 50,34 56,6 62,34 66,20"
    fill="none" stroke="#333" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Right lead -->
  <line x1="66" y1="20" x2="100" y2="20" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Connection dots -->
  <circle cx="0" cy="20" r="4" fill="#333"/>
  <circle cx="100" cy="20" r="4" fill="#333"/>
  <!-- Label -->
  <text x="41" y="40" font-family="Arial,sans-serif" font-size="8" text-anchor="middle" fill="#555">RESISTOR</text>
</svg>
