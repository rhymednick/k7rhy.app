<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 80">
  <defs>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eeeeee"/>
      <stop offset="35%" stop-color="#cccccc"/>
      <stop offset="65%" stop-color="#909090"/>
      <stop offset="100%" stop-color="#bbbbbb"/>
    </linearGradient>
  </defs>
  <rect width="140" height="80" fill="white"/>
  <text x="50" y="10" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#222">LIPSTICK</text>
  <!-- Tube body (pill/capsule shape) -->
  <rect x="2" y="14" width="100" height="52" rx="26" fill="url(#chrome)" stroke="#666" stroke-width="2"/>
  <!-- End cap detail lines (chrome tube look) -->
  <line x1="28" y1="14" x2="28" y2="66" stroke="#888" stroke-width="0.75" stroke-dasharray="2,60"/>
  <line x1="76" y1="14" x2="76" y2="66" stroke="#888" stroke-width="0.75" stroke-dasharray="2,60"/>
  <!-- Pole screw (single, center) -->
  <circle cx="51" cy="40" r="8" fill="#aaa" stroke="#777" stroke-width="1.5"/>
  <line x1="51" y1="33" x2="51" y2="47" stroke="#666" stroke-width="1.5"/>
  <!-- White wire (hot) -->
  <line x1="102" y1="32" x2="140" y2="32" stroke="#888" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="102" y1="32" x2="140" y2="32" stroke="#e8e8e8" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="140" cy="32" r="4" fill="#e0e0e0" stroke="#888" stroke-width="1"/>
  <!-- Black wire (ground) -->
  <line x1="102" y1="52" x2="140" y2="52" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="140" cy="52" r="4" fill="#1a1a1a"/>
</svg>
