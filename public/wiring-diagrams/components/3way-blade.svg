<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 200">
  <rect width="220" height="200" fill="white"/>

  <!-- POLE 1 — top (C, IN) -->
  <line x1="66"  y1="5" x2="66"  y2="70" stroke="#555" stroke-width="1.5"/>
  <line x1="154" y1="5" x2="154" y2="70" stroke="#555" stroke-width="1.5"/>
  <circle cx="66"  cy="5" r="4" fill="#555"/>
  <circle cx="154" cy="5" r="4" fill="#555"/>
  <text x="66"  y="19" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#555">C</text>
  <text x="154" y="19" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#555">IN</text>
  <text x="13" y="68" font-family="Arial,sans-serif" font-size="6.5" fill="#888">P1↑</text>

  <!-- Switch housing -->
  <rect x="10" y="70" width="200" height="60" rx="3" fill="#efefef" stroke="#333" stroke-width="2"/>
  <!-- Blade slot -->
  <rect x="22" y="78" width="176" height="8" rx="4" fill="#ddd" stroke="#888" stroke-width="1"/>
  <!-- 3 position markers -->
  <line x1="48"  y1="78" x2="48"  y2="86" stroke="#555" stroke-width="1.5"/>
  <line x1="110" y1="78" x2="110" y2="86" stroke="#555" stroke-width="1.5"/>
  <line x1="172" y1="78" x2="172" y2="86" stroke="#555" stroke-width="1.5"/>
  <text x="48"  y="77" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#444">1</text>
  <text x="110" y="77" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#444">2</text>
  <text x="172" y="77" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#444">3</text>
  <!-- Blade lever at pos 2 -->
  <rect x="104" y="67" width="12" height="20" rx="3" fill="#aaa" stroke="#666" stroke-width="1.5"/>
  <!-- Title -->
  <text x="110" y="111" font-family="Arial,sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="#333">3-WAY BLADE  (2P3T)</text>
  <text x="13" y="128" font-family="Arial,sans-serif" font-size="6.5" fill="#888">P2↓</text>

  <!-- POLE 2 — bottom (C, IN) -->
  <line x1="66"  y1="130" x2="66"  y2="195" stroke="#555" stroke-width="1.5"/>
  <line x1="154" y1="130" x2="154" y2="195" stroke="#555" stroke-width="1.5"/>
  <text x="66"  y="182" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#555">C</text>
  <text x="154" y="182" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#555">IN</text>
  <circle cx="66"  cy="195" r="4" fill="#555"/>
  <circle cx="154" cy="195" r="4" fill="#555"/>
</svg>
