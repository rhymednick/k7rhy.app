<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 110">
  <rect width="200" height="110" fill="white"/>
  <text x="100" y="10" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#222">3-WAY BLADE SWITCH</text>
  <!-- Switch housing -->
  <rect x="10" y="18" width="180" height="42" rx="3" fill="#efefef" stroke="#333" stroke-width="2"/>
  <!-- Blade slot (the elongated opening the lever rides in) -->
  <rect x="20" y="24" width="160" height="8" rx="4" fill="#ddd" stroke="#888" stroke-width="1"/>
  <!-- Position markers along blade slot -->
  <line x1="48" y1="24" x2="48" y2="32" stroke="#555" stroke-width="1.5"/>
  <line x1="100" y1="24" x2="100" y2="32" stroke="#555" stroke-width="1.5"/>
  <line x1="152" y1="24" x2="152" y2="32" stroke="#555" stroke-width="1.5"/>
  <text x="48" y="23" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#444">1</text>
  <text x="100" y="23" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#444">2</text>
  <text x="152" y="23" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#444">3</text>
  <!-- Blade lever (shown at center/neutral) -->
  <rect x="94" y="14" width="12" height="18" rx="3" fill="#aaa" stroke="#666" stroke-width="1.5"/>
  <!-- Contact labels inside housing -->
  <text x="38" y="46" font-family="Arial,sans-serif" font-size="7.5" text-anchor="middle" fill="#555">BRDG</text>
  <text x="100" y="46" font-family="Arial,sans-serif" font-size="7.5" text-anchor="middle" fill="#555">COM</text>
  <text x="162" y="46" font-family="Arial,sans-serif" font-size="7.5" text-anchor="middle" fill="#555">NECK</text>
  <!-- 4 contact stubs extending downward -->
  <!-- Contact A: bridge input (x=35) -->
  <line x1="35" y1="60" x2="35" y2="100" stroke="#555" stroke-width="1.5"/>
  <rect x="30" y="90" width="10" height="10" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="35" cy="100" r="4" fill="#555"/>
  <!-- Contact B: output/common (x=80) -->
  <line x1="80" y1="60" x2="80" y2="100" stroke="#555" stroke-width="1.5"/>
  <rect x="75" y="90" width="10" height="10" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="80" cy="100" r="4" fill="#555"/>
  <!-- Contact C: output/common 2 (x=120) -->
  <line x1="120" y1="60" x2="120" y2="100" stroke="#555" stroke-width="1.5"/>
  <rect x="115" y="90" width="10" height="10" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="120" cy="100" r="4" fill="#555"/>
  <!-- Contact D: neck input (x=165) -->
  <line x1="165" y1="60" x2="165" y2="100" stroke="#555" stroke-width="1.5"/>
  <rect x="160" y="90" width="10" height="10" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="165" cy="100" r="4" fill="#555"/>
  <!-- Contact labels -->
  <text x="35" y="73" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#666">A</text>
  <text x="80" y="73" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#666">B</text>
  <text x="120" y="73" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#666">C</text>
  <text x="165" y="73" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#666">D</text>
</svg>
