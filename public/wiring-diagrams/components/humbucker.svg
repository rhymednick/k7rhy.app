<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100">
  <rect width="160" height="100" fill="white"/>
  <text x="62" y="11" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#222">HUMBUCKER</text>
  <rect x="2" y="14" width="120" height="72" rx="4" fill="#efefef" stroke="#333" stroke-width="2"/>
  <line x1="62" y1="14" x2="62" y2="86" stroke="#777" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Coil 1 poles -->
  <circle cx="14" cy="50" r="5.5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <circle cx="29" cy="50" r="5.5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <circle cx="44" cy="50" r="5.5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <!-- Coil 2 poles -->
  <circle cx="74" cy="50" r="5.5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <circle cx="89" cy="50" r="5.5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <circle cx="104" cy="50" r="5.5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <!-- Black wire (hot) -->
  <line x1="122" y1="29" x2="160" y2="29" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="160" cy="29" r="4" fill="#1a1a1a"/>
  <!-- White wire -->
  <line x1="122" y1="43" x2="160" y2="43" stroke="#888" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="122" y1="43" x2="160" y2="43" stroke="#e8e8e8" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="160" cy="43" r="4" fill="#e0e0e0" stroke="#888" stroke-width="1"/>
  <!-- Red wire -->
  <line x1="122" y1="57" x2="160" y2="57" stroke="#cc2200" stroke-width="3" stroke-linecap="round"/>
  <circle cx="160" cy="57" r="4" fill="#cc2200"/>
  <!-- Green wire (green+bare to gnd) -->
  <line x1="122" y1="71" x2="160" y2="71" stroke="#2a7a38" stroke-width="3" stroke-linecap="round"/>
  <circle cx="160" cy="71" r="4" fill="#2a7a38"/>
</svg>
