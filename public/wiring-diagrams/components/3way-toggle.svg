<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 200">
  <rect width="100" height="200" fill="white"/>
  <text x="50" y="10" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#222">3-WAY</text>
  <text x="50" y="22" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#222">TOGGLE</text>
  <!-- Toggle ball (tip of lever) -->
  <circle cx="50" cy="38" r="9" fill="#ccc" stroke="#666" stroke-width="1.5"/>
  <!-- Toggle lever shaft -->
  <rect x="46" y="46" width="8" height="26" fill="#bbb" stroke="#666" stroke-width="1"/>
  <!-- Mounting bushing / nut -->
  <rect x="36" y="70" width="28" height="14" rx="2" fill="#ddd" stroke="#555" stroke-width="1.5"/>
  <!-- Hex nut lines -->
  <line x1="36" y1="75" x2="64" y2="75" stroke="#aaa" stroke-width="0.75"/>
  <line x1="36" y1="80" x2="64" y2="80" stroke="#aaa" stroke-width="0.75"/>
  <!-- Switch housing body (oval) -->
  <rect x="18" y="84" width="64" height="72" rx="10" fill="#efefef" stroke="#333" stroke-width="2"/>
  <!-- Position labels on sides -->
  <text x="22" y="106" font-family="Arial,sans-serif" font-size="7" fill="#555">RTHM</text>
  <text x="50" y="120" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#555">BOTH</text>
  <text x="68" y="106" font-family="Arial,sans-serif" font-size="7" text-anchor="end" fill="#555">LEAD</text>
  <!-- Center internal contacts indicator -->
  <circle cx="50" cy="130" r="5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <!-- 4 solder lugs extending from bottom -->
  <line x1="28" y1="156" x2="28" y2="190" stroke="#555" stroke-width="1.5"/>
  <rect x="23" y="182" width="10" height="8" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="28" cy="190" r="4" fill="#555"/>
  <line x1="43" y1="156" x2="43" y2="190" stroke="#555" stroke-width="1.5"/>
  <rect x="38" y="182" width="10" height="8" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="43" cy="190" r="4" fill="#555"/>
  <line x1="57" y1="156" x2="57" y2="190" stroke="#555" stroke-width="1.5"/>
  <rect x="52" y="182" width="10" height="8" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="57" cy="190" r="4" fill="#555"/>
  <line x1="72" y1="156" x2="72" y2="190" stroke="#555" stroke-width="1.5"/>
  <rect x="67" y="182" width="10" height="8" rx="1" fill="#ccc" stroke="#555" stroke-width="1"/>
  <circle cx="72" cy="190" r="4" fill="#555"/>
  <!-- Lug labels -->
  <text x="28" y="170" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#666">A</text>
  <text x="43" y="170" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#666">B</text>
  <text x="57" y="170" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#666">C</text>
  <text x="72" y="170" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#666">D</text>
</svg>
