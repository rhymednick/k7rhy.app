<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 55 50">
  <rect width="55" height="50" fill="white"/>
  <!-- Vertical lead wire -->
  <line x1="27" y1="0" x2="27" y2="14" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ground symbol: 3 horizontal lines, decreasing width -->
  <line x1="5" y1="14" x2="49" y2="14" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="12" y1="24" x2="42" y2="24" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="19" y1="34" x2="35" y2="34" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Connection dot at top -->
  <circle cx="27" cy="0" r="4" fill="#333"/>
</svg>
