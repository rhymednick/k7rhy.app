<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 300">
  <rect width="320" height="300" fill="white"/>

  <!-- ── POLE 1 — top (6 lugs: C 1 2 3 4 5) ── -->
  <!-- x positions: 89 117 146 174 203 231 -->
  <line x1="89"  y1="5" x2="89"  y2="60" stroke="#555" stroke-width="1.5"/>
  <line x1="117" y1="5" x2="117" y2="60" stroke="#555" stroke-width="1.5"/>
  <line x1="146" y1="5" x2="146" y2="60" stroke="#555" stroke-width="1.5"/>
  <line x1="174" y1="5" x2="174" y2="60" stroke="#555" stroke-width="1.5"/>
  <line x1="203" y1="5" x2="203" y2="60" stroke="#555" stroke-width="1.5"/>
  <line x1="231" y1="5" x2="231" y2="60" stroke="#555" stroke-width="1.5"/>
  <circle cx="89"  cy="5" r="4" fill="#555"/>
  <circle cx="117" cy="5" r="4" fill="#555"/>
  <circle cx="146" cy="5" r="4" fill="#555"/>
  <circle cx="174" cy="5" r="4" fill="#555"/>
  <circle cx="203" cy="5" r="4" fill="#555"/>
  <circle cx="231" cy="5" r="4" fill="#555"/>
  <text x="89"  y="20" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#555">C</text>
  <text x="117" y="20" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#555">1</text>
  <text x="146" y="20" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#555">2</text>
  <text x="174" y="20" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#555">3</text>
  <text x="203" y="20" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#555">4</text>
  <text x="231" y="20" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#555">5</text>
  <text x="68" y="58" font-family="Arial,sans-serif" font-size="6.5" text-anchor="end" fill="#888">P1↑</text>

  <!-- ── POLE 3 — left (6 lugs: C 1 2 3 4 5) ── -->
  <!-- y positions: 86 111 137 163 188 214 -->
  <line x1="5" y1="86"  x2="60" y2="86"  stroke="#555" stroke-width="1.5"/>
  <line x1="5" y1="111" x2="60" y2="111" stroke="#555" stroke-width="1.5"/>
  <line x1="5" y1="137" x2="60" y2="137" stroke="#555" stroke-width="1.5"/>
  <line x1="5" y1="163" x2="60" y2="163" stroke="#555" stroke-width="1.5"/>
  <line x1="5" y1="188" x2="60" y2="188" stroke="#555" stroke-width="1.5"/>
  <line x1="5" y1="214" x2="60" y2="214" stroke="#555" stroke-width="1.5"/>
  <circle cx="5" cy="86"  r="4" fill="#555"/>
  <circle cx="5" cy="111" r="4" fill="#555"/>
  <circle cx="5" cy="137" r="4" fill="#555"/>
  <circle cx="5" cy="163" r="4" fill="#555"/>
  <circle cx="5" cy="188" r="4" fill="#555"/>
  <circle cx="5" cy="214" r="4" fill="#555"/>
  <text x="20" y="89"  font-family="Arial,sans-serif" font-size="6" text-anchor="start" fill="#555">C</text>
  <text x="20" y="114" font-family="Arial,sans-serif" font-size="6" text-anchor="start" fill="#555">1</text>
  <text x="20" y="140" font-family="Arial,sans-serif" font-size="6" text-anchor="start" fill="#555">2</text>
  <text x="20" y="166" font-family="Arial,sans-serif" font-size="6" text-anchor="start" fill="#555">3</text>
  <text x="20" y="191" font-family="Arial,sans-serif" font-size="6" text-anchor="start" fill="#555">4</text>
  <text x="20" y="217" font-family="Arial,sans-serif" font-size="6" text-anchor="start" fill="#555">5</text>
  <text x="62" y="76" font-family="Arial,sans-serif" font-size="6.5" text-anchor="start" fill="#888">←P3</text>

  <!-- ── Switch housing ── -->
  <rect x="60" y="60" width="200" height="180" rx="4" fill="#efefef" stroke="#333" stroke-width="2"/>

  <!-- Blade slot (horizontal, near top of body) -->
  <rect x="72" y="70" width="176" height="8" rx="4" fill="#ddd" stroke="#888" stroke-width="1"/>
  <!-- 5 position markers -->
  <line x1="90"  y1="70" x2="90"  y2="78" stroke="#555" stroke-width="1.5"/>
  <line x1="122" y1="70" x2="122" y2="78" stroke="#555" stroke-width="1.5"/>
  <line x1="160" y1="70" x2="160" y2="78" stroke="#555" stroke-width="1.5"/>
  <line x1="198" y1="70" x2="198" y2="78" stroke="#555" stroke-width="1.5"/>
  <line x1="228" y1="70" x2="228" y2="78" stroke="#555" stroke-width="1.5"/>
  <text x="90"  y="69" font-family="Arial,sans-serif" font-size="5.5" text-anchor="middle" fill="#444">1</text>
  <text x="122" y="69" font-family="Arial,sans-serif" font-size="5.5" text-anchor="middle" fill="#444">2</text>
  <text x="160" y="69" font-family="Arial,sans-serif" font-size="5.5" text-anchor="middle" fill="#444">3</text>
  <text x="198" y="69" font-family="Arial,sans-serif" font-size="5.5" text-anchor="middle" fill="#444">4</text>
  <text x="228" y="69" font-family="Arial,sans-serif" font-size="5.5" text-anchor="middle" fill="#444">5</text>
  <!-- Blade lever at pos 3 -->
  <rect x="154" y="57" width="12" height="20" rx="3" fill="#aaa" stroke="#666" stroke-width="1.5"/>

  <!-- Title and pole key -->
  <text x="160" y="110" font-family="Arial,sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#333">MEGA SWITCH</text>
  <text x="160" y="124" font-family="Arial,sans-serif" font-size="8" text-anchor="middle" fill="#555">(4P5T · 24 lugs)</text>
  <text x="160" y="150" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#888">P1 = top   P2 = bottom</text>
  <text x="160" y="163" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#888">P3 = left   P4 = right</text>
  <text x="160" y="180" font-family="Arial,sans-serif" font-size="6.5" text-anchor="middle" fill="#aaa">C = common · 1–5 = switched</text>

  <!-- ── POLE 4 — right (6 lugs: C 1 2 3 4 5) ── -->
  <line x1="260" y1="86"  x2="315" y2="86"  stroke="#555" stroke-width="1.5"/>
  <line x1="260" y1="111" x2="315" y2="111" stroke="#555" stroke-width="1.5"/>
  <line x1="260" y1="137" x2="315" y2="137" stroke="#555" stroke-width="1.5"/>
  <line x1="260" y1="163" x2="315" y2="163" stroke="#555" stroke-width="1.5"/>
  <line x1="260" y1="188" x2="315" y2="188" stroke="#555" stroke-width="1.5"/>
  <line x1="260" y1="214" x2="315" y2="214" stroke="#555" stroke-width="1.5"/>
  <circle cx="315" cy="86"  r="4" fill="#555"/>
  <circle cx="315" cy="111" r="4" fill="#555"/>
  <circle cx="315" cy="137" r="4" fill="#555"/>
  <circle cx="315" cy="163" r="4" fill="#555"/>
  <circle cx="315" cy="188" r="4" fill="#555"/>
  <circle cx="315" cy="214" r="4" fill="#555"/>
  <text x="300" y="89"  font-family="Arial,sans-serif" font-size="6" text-anchor="end" fill="#555">C</text>
  <text x="300" y="114" font-family="Arial,sans-serif" font-size="6" text-anchor="end" fill="#555">1</text>
  <text x="300" y="140" font-family="Arial,sans-serif" font-size="6" text-anchor="end" fill="#555">2</text>
  <text x="300" y="166" font-family="Arial,sans-serif" font-size="6" text-anchor="end" fill="#555">3</text>
  <text x="300" y="191" font-family="Arial,sans-serif" font-size="6" text-anchor="end" fill="#555">4</text>
  <text x="300" y="217" font-family="Arial,sans-serif" font-size="6" text-anchor="end" fill="#555">5</text>
  <text x="258" y="76" font-family="Arial,sans-serif" font-size="6.5" text-anchor="end" fill="#888">P4→</text>

  <!-- ── POLE 2 — bottom (6 lugs: C 1 2 3 4 5) ── -->
  <line x1="89"  y1="240" x2="89"  y2="295" stroke="#555" stroke-width="1.5"/>
  <line x1="117" y1="240" x2="117" y2="295" stroke="#555" stroke-width="1.5"/>
  <line x1="146" y1="240" x2="146" y2="295" stroke="#555" stroke-width="1.5"/>
  <line x1="174" y1="240" x2="174" y2="295" stroke="#555" stroke-width="1.5"/>
  <line x1="203" y1="240" x2="203" y2="295" stroke="#555" stroke-width="1.5"/>
  <line x1="231" y1="240" x2="231" y2="295" stroke="#555" stroke-width="1.5"/>
  <text x="89"  y="282" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#555">C</text>
  <text x="117" y="282" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#555">1</text>
  <text x="146" y="282" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#555">2</text>
  <text x="174" y="282" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#555">3</text>
  <text x="203" y="282" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#555">4</text>
  <text x="231" y="282" font-family="Arial,sans-serif" font-size="6" text-anchor="middle" fill="#555">5</text>
  <circle cx="89"  cy="295" r="4" fill="#555"/>
  <circle cx="117" cy="295" r="4" fill="#555"/>
  <circle cx="146" cy="295" r="4" fill="#555"/>
  <circle cx="174" cy="295" r="4" fill="#555"/>
  <circle cx="203" cy="295" r="4" fill="#555"/>
  <circle cx="231" cy="295" r="4" fill="#555"/>
  <text x="68" y="244" font-family="Arial,sans-serif" font-size="6.5" text-anchor="end" fill="#888">P2↓</text>
</svg>
